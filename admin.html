<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f7f2ff;
    margin:0;
    padding:20px;
}

h1{
    color:#7a2cff;
}

.card{
    background:white;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
}

button{
    background:#7a2cff;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>💜 Administration</h1>

<div class="card">
<h2>Réponses reçues</h2>

<div id="liste">
Chargement...
</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function charger(){

const zone=document.getElementById("liste");

zone.innerHTML="";

const querySnapshot=await getDocs(collection(db,"reponses"));

querySnapshot.forEach((doc)=>{

zone.innerHTML+=`
<div class="card">
<pre>${JSON.stringify(doc.data(),null,2)}</pre>
</div>
`;

});

}

charger();

</script>

</body>
</html>
